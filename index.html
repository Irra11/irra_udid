<!DOCTYPE html>
<html>
<head>
    <title>Irra Admin | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 flex font-sans">
    <div class="w-64 bg-slate-900 min-h-screen text-white p-6">
        <h1 class="text-xl font-bold text-blue-400 mb-10">Irra Admin</h1>
        <div class="bg-blue-600 p-3 rounded-lg cursor-pointer"><i class="fas fa-shopping-cart mr-2"></i> Orders</div>
    </div>

    <div class="flex-1 p-10">
        <h2 class="text-2xl font-bold mb-8">Order Management</h2>
        
        <div class="grid grid-cols-3 gap-6 mb-10">
            <div class="bg-white p-6 rounded-xl shadow-sm border">
                <p class="text-gray-400 text-xs uppercase">Total Orders</p>
                <p class="text-2xl font-bold">{{ stats.total }}</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border">
                <p class="text-gray-400 text-xs uppercase">Pending</p>
                <p class="text-2xl font-bold text-yellow-500">{{ stats.pending }}</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border">
                <p class="text-gray-400 text-xs uppercase">Completed</p>
                <p class="text-2xl font-bold text-green-500">{{ stats.done }}</p>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-gray-50 text-gray-400 text-xs uppercase">
                    <tr><th class="p-4">User</th><th class="p-4">UDID</th><th class="p-4">Status</th><th class="p-4">Actions</th></tr>
                </thead>
                <tbody class="divide-y text-sm">
                    {% for order in orders %}
                    <tr>
                        <td class="p-4 font-bold">{{ order.username }}<br><span class="text-xs text-gray-400 font-normal">{{ order.date }}</span></td>
                        <td class="p-4 font-mono text-red-500">{{ order.udid }}</td>
                        <td class="p-4"><span class="px-3 py-1 rounded-full text-xs font-bold {% if order.status=='PENDING' %}bg-yellow-100 text-yellow-600{% else %}bg-green-100 text-green-600{% endif %}">{{ order.status }}</span></td>
                        <td class="p-4 flex gap-2">
                            <form action="/action/approve/{{ order.id }}/{{ order.user_id }}" method="post"><button class="bg-green-500 text-white p-2 rounded"><i class="fas fa-check"></i></button></form>
                            <form action="/action/upload/{{ order.id }}/{{ order.user_id }}" method="post" enctype="multipart/form-data">
                                <label class="bg-blue-500 text-white p-2 rounded cursor-pointer"><i class="fas fa-upload"></i><input type="file" name="file" class="hidden" onchange="this.form.submit()"></label>
                            </form>
                            <form action="/action/reject/{{ order.id }}/{{ order.user_id }}" method="post"><button class="bg-red-500 text-white p-2 rounded"><i class="fas fa-times"></i></button></form>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
