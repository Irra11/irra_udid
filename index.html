<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Get Device UDID | Auto Fetch</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Hanuman:wght@400;700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        :root { --primary: #007AFF; --accent: #5856D6; --bg: #f2f2f7; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Hanuman', sans-serif; }
        body {
            background-color: var(--bg);
            background-image: radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                              radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
            background-attachment: fixed; min-height: 100vh; display: flex; align-items: center; justify-content: center; color: #fff; padding: 20px;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 30px; width: 100%; max-width: 450px; padding: 40px 30px; text-align: center;
        }
        .icon-circle {
            width: 80px; height: 80px; background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 22px; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-size: 35px;
        }
        h1 { font-size: 24px; margin-bottom: 10px; }
        .steps-container { text-align: left; background: rgba(0,0,0,0.2); padding: 20px; border-radius: 20px; margin-bottom: 30px; font-size: 13px; }
        .step-item { display: flex; align-items: center; gap: 15px; margin-bottom: 12px; }
        .step-num { min-width: 24px; height: 24px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        #resultArea { display: none; }
        .udid-display {
            background: #000; padding: 20px; border-radius: 15px; font-family: monospace; color: #00ffcc; 
            word-break: break-all; border: 1px solid rgba(0, 255, 204, 0.3); margin-bottom: 20px;
        }
        .btn-main {
            display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; 
            background: #fff; color: #000; padding: 18px; border-radius: 18px; font-weight: 700; text-decoration: none; cursor: pointer;
        }
        .btn-main.primary { background: var(--primary); color: #fff; }
    </style>
</head>
<body>

    <div class="glass-card animate__animated animate__fadeIn">
        <div class="icon-circle"><i class="fas fa-fingerprint"></i></div>

        <!-- STATE 1: GET UDID -->
        <div id="initArea">
            <h1>Get Device UDID</h1>
            <div class="steps-container">
                <div class="step-item"><div class="step-num">1</div><span>ចុចប៊ូតុង "ទាញយក Profile"</span></div>
                <div class="step-item"><div class="step-num">2</div><span>ចុច "Allow" រួចចូលទៅ Settings > Install</span></div>
                <div class="step-item"><div class="step-num">3</div><span>ប្រព័ន្ធនឹងបង្ហាញ UDID នៅទីនេះស្វ័យប្រវត្ត</span></div>
            </div>
            
            <!-- UPDATE THIS LINK TO YOUR RENDER URL -->
            <a href="https://panelbottelegram.onrender.com/api/get-profile" class="btn-main primary">
                <i class="fas fa-download"></i> ទាញយក Profile
            </a>
        </div>

        <!-- STATE 2: SHOW UDID -->
        <div id="resultArea" class="animate__animated animate__zoomIn">
            <h1 style="color: #00ffcc;">UDID របស់អ្នក</h1>
            <div class="udid-display" id="udidText">Fetching...</div>
            <button class="btn-main" onclick="copyUDID()">
                <i class="fas fa-copy"></i> ចម្លងទុក (Copy)
            </button>
        </div>
    </div>

    <script>
        // When page loads, check if UDID is in the URL
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const udid = urlParams.get('udid');
            if (udid) {
                document.getElementById('initArea').style.display = 'none';
                document.getElementById('resultArea').style.display = 'block';
                document.getElementById('udidText').innerText = udid;
                window.history.replaceState({}, document.title, window.location.pathname);
            }
        };

        function copyUDID() {
            const text = document.getElementById('udidText').innerText;
            navigator.clipboard.writeText(text);
            alert("Copied!");
        }
    </script>
</body>
</html>
